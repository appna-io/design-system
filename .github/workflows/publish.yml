name: Publish to npm

on:
  push:
    branches: [main]

# Prevent overlapping releases from racing on the same tags/versions.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # push the Version PR branch + create git tags
  pull-requests: write # open/update the "Version Packages" PR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # With pending changesets: opens/updates a "Version Packages" PR.
      # With no changesets (i.e. that PR was merged): runs `pnpm release`,
      # which builds and `changeset publish`es every package whose version
      # is not yet on npm, then pushes git tags.
      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
          commit: 'chore: version apx-ds packages'
          title: 'chore: version apx-ds packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
